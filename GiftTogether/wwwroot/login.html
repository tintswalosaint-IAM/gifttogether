<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – GiftTogether</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="/">🎁 GiftTogether</a>
  <div class="nav-links">
    <a href="/register.html" class="btn btn-primary btn-sm">Get started</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="card">
    <h1 class="page-title">Welcome back</h1>
    <p class="page-subtitle">Log in to manage your registries.</p>

    <div id="alert" class="alert hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="jane@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">
        Log in
      </button>
    </form>

    <p class="text-center mt-2" style="font-size:0.88rem;">
      Don't have an account? <a href="/register.html">Create one</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  Auth.redirectIfLoggedIn();

  // Show a friendly message when redirected due to an expired session
  const reason = new URLSearchParams(location.search).get('reason');
  if (reason === 'session') {
    showAlert(document.getElementById('alert'), 'Your session has expired. Please log in again.', 'error');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alert = document.getElementById('alert');
    const btn = document.getElementById('submitBtn');
    hideAlert(alert);

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in...';

    try {
      const data = await API.login(email, password);
      Auth.save(data);
      window.location.href = '/dashboard.html';
    } catch (err) {
      showAlert(alert, err.message);
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });
</script>
</body>
</html>
